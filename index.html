<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>우리집 자산</title>
<meta name="theme-color" content="#1a2b4a">
<style>
/* ============ 기본 ============ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1a2b4a; --navy2:#24395e; --accent:#2f6fed; --teal:#0ea5a4;
  --bg:#f4f6fa; --card:#ffffff; --line:#e5e9f0; --txt:#1d2433; --sub:#68738a;
  --red:#e5484d; --blue:#2f6fed; --green:#18a058;
  --radius:14px; --shadow:0 1px 3px rgba(20,30,60,.08);
}
html{font-size:16px}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:var(--bg); color:var(--txt); min-height:100vh; -webkit-font-smoothing:antialiased}
button{font-family:inherit; cursor:pointer; border:none; background:none}
input,select,textarea{font-family:inherit; font-size:1rem}
.wrap{max-width:760px; margin:0 auto; padding:0 14px 90px}

/* ============ 로그인 ============ */
#loginView{display:none; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px}
.login-card{background:var(--card); border-radius:20px; box-shadow:0 8px 30px rgba(20,30,60,.12); padding:36px 28px; width:100%; max-width:380px}
.login-card h1{font-size:1.5rem; color:var(--navy); text-align:center; margin-bottom:6px}
.login-card p.desc{text-align:center; color:var(--sub); font-size:.9rem; margin-bottom:24px}
.login-card input{width:100%; padding:13px 14px; border:1.5px solid var(--line); border-radius:10px; margin-bottom:10px; font-size:1.05rem}
.login-card input:focus{outline:none; border-color:var(--accent)}
.login-card button{width:100%; padding:14px; background:var(--navy); color:#fff; border-radius:10px; font-size:1.05rem; font-weight:700; margin-top:6px}
.login-card .err{color:var(--red); font-size:.88rem; text-align:center; margin-top:10px; min-height:1.2em}

/* ============ 헤더/탭 ============ */
header{background:var(--navy); color:#fff; padding:14px 0 0; position:sticky; top:0; z-index:50}
.hd-in{max-width:760px; margin:0 auto; padding:0 14px}
.hd-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px}
.hd-top h1{font-size:1.15rem; font-weight:800}
.hd-top .who{font-size:.85rem; opacity:.85; margin-left:8px; font-weight:400}
.hd-top .gear{color:#fff; font-size:1.3rem; padding:4px 8px}
.tabs{display:flex; gap:2px}
.tabs button{flex:1; padding:11px 0 13px; color:rgba(255,255,255,.65); font-size:.98rem; font-weight:700; border-bottom:3px solid transparent}
.tabs button.on{color:#fff; border-bottom-color:#fff}

/* ============ 공통 카드/버튼 ============ */
.card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 16px; margin-top:14px}
.card h3{font-size:.95rem; color:var(--sub); font-weight:700; margin-bottom:12px}
.btn{display:inline-block; padding:10px 16px; border-radius:10px; font-weight:700; font-size:.95rem}
.btn-primary{background:var(--navy); color:#fff}
.btn-ghost{background:#eef1f7; color:var(--navy)}
.btn-danger{background:#fdeaea; color:var(--red)}
.btn-sm{padding:7px 12px; font-size:.85rem; border-radius:8px}
.row{display:flex; gap:8px; align-items:center}
.grow{flex:1}
.muted{color:var(--sub); font-size:.85rem}
.right{text-align:right}

/* ============ 재산현황 ============ */
.networth{background:linear-gradient(135deg,var(--navy),#2c4a7c); color:#fff; border-radius:18px; padding:24px 20px; margin-top:16px}
.networth .lbl{font-size:.88rem; opacity:.8}
.networth .big{font-size:2rem; font-weight:800; margin:4px 0 2px; letter-spacing:-.5px}
.networth .kor{font-size:.9rem; opacity:.75}
.networth .split{display:flex; margin-top:18px; border-top:1px solid rgba(255,255,255,.18); padding-top:14px}
.networth .split>div{flex:1}
.networth .split .lbl{font-size:.8rem}
.networth .split .val{font-size:1.05rem; font-weight:700; margin-top:2px}
.networth .diff{margin-top:10px; font-size:.88rem}
.up{color:#7dd3a0}.down{color:#ff9d9d}
.mem-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px}
.mem-card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px}
.mem-card .nm{font-weight:800; font-size:.95rem; margin-bottom:8px; color:var(--navy)}
.mem-card .net{font-size:1.1rem; font-weight:800}
.mem-card .sub2{font-size:.78rem; color:var(--sub); margin-top:4px; line-height:1.5}
.catbar{margin-bottom:10px}
.catbar .t{display:flex; justify-content:space-between; font-size:.88rem; margin-bottom:4px}
.catbar .bar{height:8px; background:#edf0f6; border-radius:5px; overflow:hidden}
.catbar .bar>i{display:block; height:100%; border-radius:5px; background:var(--accent)}
.catbar.debt .bar>i{background:var(--red)}
#trendChart{width:100%; height:180px; display:block}

/* ============ 가계부 ============ */
.month-nav{display:flex; align-items:center; justify-content:center; gap:14px; margin-top:16px}
.month-nav b{font-size:1.15rem; color:var(--navy)}
.month-nav button{font-size:1.2rem; padding:6px 14px; color:var(--sub); background:var(--card); border-radius:10px; box-shadow:var(--shadow)}
.led-sum{display:flex; gap:10px; margin-top:12px}
.led-sum>div{flex:1; background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:12px; text-align:center}
.led-sum .l{font-size:.78rem; color:var(--sub)}
.led-sum .v{font-size:1rem; font-weight:800; margin-top:3px}
.led-day{margin-top:14px}
.led-day .dh{font-size:.82rem; color:var(--sub); font-weight:700; padding:0 4px; margin-bottom:6px}
.led-item{background:var(--card); border-radius:12px; box-shadow:var(--shadow); padding:12px 14px; display:flex; align-items:center; gap:10px; margin-bottom:6px}
.led-item .cat{font-size:.72rem; background:#eef1f7; color:var(--navy); border-radius:6px; padding:3px 7px; font-weight:700; white-space:nowrap}
.led-item .mm{flex:1; font-size:.92rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.led-item .amt{font-weight:800; font-size:.95rem; white-space:nowrap}
/* 지출 달력 */
.cal-card{padding:12px 6px 8px}
.cal-week,.cal-grid{display:grid; grid-template-columns:repeat(7,1fr)}
.cal-week div{text-align:center; font-size:.72rem; color:var(--sub); padding:2px 0 6px; font-weight:700}
.cal-week div:first-child{color:var(--red)}
.cal-cell{min-height:54px; border-radius:8px; padding:3px 1px; cursor:pointer; text-align:center; overflow:hidden}
.cal-cell.empty{cursor:default}
.cal-cell .d{font-size:.78rem; font-weight:700; color:var(--txt)}
.cal-cell.sun .d{color:var(--red)}
.cal-cell.today{background:#e8f1ff}
.cal-cell.today .d{color:var(--accent)}
.cal-cell .ce{font-size:.64rem; color:var(--red); font-weight:800; line-height:1.3}
.cal-cell .ci{font-size:.64rem; color:var(--blue); font-weight:800; line-height:1.3}
.cal-cell .cp{font-size:.6rem; color:#e8871e; font-weight:800; line-height:1.3}
.cal-legend{display:flex; gap:12px; justify-content:center; margin-top:6px; font-size:.68rem; color:var(--sub)}
.cal-legend b.e{color:var(--red)} .cal-legend b.i{color:var(--blue)} .cal-legend b.p{color:#e8871e}
/* 고정지출 체크리스트 */
.rec-item{display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line); cursor:pointer}
.rec-item:last-child{border-bottom:none}
.rec-item .chk{width:24px; height:24px; border-radius:50%; border:2px solid #c6cede; display:flex; align-items:center; justify-content:center; font-size:.85rem; color:#fff; flex-shrink:0}
.rec-item.done .chk{background:var(--green); border-color:var(--green)}
.rec-item .dd{font-size:.78rem; color:var(--sub); font-weight:700; width:34px; flex-shrink:0}
.rec-item .nm{flex:1; font-size:.92rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.rec-item.done .nm{color:var(--sub); text-decoration:line-through}
.rec-item .amt{font-weight:800; font-size:.92rem; white-space:nowrap}
.rec-item.done .amt{color:var(--sub)}
.rec-sub{font-size:.72rem; color:var(--sub); font-weight:400; margin-top:2px}
.rec-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.rec-head h3{margin-bottom:0}
.amt.expense{color:var(--txt)} .amt.income{color:var(--blue)}
.empty{text-align:center; color:var(--sub); padding:40px 0; font-size:.92rem}

/* ============ 자산 탭 ============ */
.as-owner{margin-top:18px}
.as-owner .oh{display:flex; justify-content:space-between; align-items:baseline; padding:0 4px; margin-bottom:8px}
.as-owner .oh b{color:var(--navy)}
.as-owner .oh span{font-size:.85rem; color:var(--sub); font-weight:700}
.as-item{background:var(--card); border-radius:12px; box-shadow:var(--shadow); padding:13px 14px; display:flex; align-items:center; gap:10px; margin-bottom:6px}
.as-item .cat{font-size:.72rem; border-radius:6px; padding:3px 7px; font-weight:700; background:#e8f1ff; color:var(--blue); white-space:nowrap}
.as-item.debt .cat{background:#fdeaea; color:var(--red)}
.as-item .nm{flex:1; font-size:.94rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.as-item .val{font-weight:800; white-space:nowrap}
.as-item.debt .val{color:var(--red)}

/* ============ 플로팅 추가 버튼 ============ */
.fab{position:fixed; right:calc(50% - 380px + 20px); bottom:24px; width:56px; height:56px; border-radius:50%;
  background:var(--accent); color:#fff; font-size:1.7rem; box-shadow:0 6px 18px rgba(47,111,237,.4); z-index:40; display:none; line-height:1}
@media(max-width:800px){.fab{right:20px}}

/* ============ 모달 ============ */
.overlay{position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:100; display:none; align-items:flex-end; justify-content:center}
.overlay.on{display:flex}
.modal{background:#fff; width:100%; max-width:560px; border-radius:20px 20px 0 0; padding:22px 18px 30px; max-height:88vh; overflow-y:auto}
@media(min-width:600px){.overlay{align-items:center}.modal{border-radius:20px}}
.modal h2{font-size:1.1rem; color:var(--navy); margin-bottom:16px}
.f-row{margin-bottom:12px}
.f-row label{display:block; font-size:.82rem; color:var(--sub); font-weight:700; margin-bottom:5px}
.f-row input,.f-row select,.f-row textarea{width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px}
.f-row input:focus,.f-row select:focus{outline:none; border-color:var(--accent)}
.seg{display:flex; background:#eef1f7; border-radius:10px; padding:3px}
.seg button{flex:1; padding:9px 0; border-radius:8px; font-weight:700; color:var(--sub)}
.seg button.on.exp{background:var(--card); color:var(--red); box-shadow:var(--shadow)}
.seg button.on.inc{background:var(--card); color:var(--blue); box-shadow:var(--shadow)}
.seg button.on.plain{background:var(--card); color:var(--navy); box-shadow:var(--shadow)}
.kor-hint{font-size:.82rem; color:var(--teal); margin-top:4px; min-height:1.1em; font-weight:600}
.m-actions{display:flex; gap:8px; margin-top:18px}
.m-actions .btn{flex:1; text-align:center; padding:13px}
.menu-item{display:flex; align-items:center; justify-content:space-between; width:100%; padding:15px 6px; border-bottom:1px solid var(--line); font-size:.98rem; color:var(--txt)}
.menu-item:last-child{border-bottom:none}
.menu-item span.arr{color:var(--sub)}
table.tbl{width:100%; border-collapse:collapse; font-size:.82rem}
table.tbl th{color:var(--sub); text-align:left; padding:6px 4px; border-bottom:1px solid var(--line); white-space:nowrap}
table.tbl td{padding:7px 4px; border-bottom:1px solid var(--line); vertical-align:top}
.hist-row{display:flex; justify-content:space-between; padding:9px 4px; border-bottom:1px solid var(--line); font-size:.88rem}

/* ============ 푸터 ============ */
footer{text-align:center; padding:30px 0 20px; color:#9aa3b5; font-size:.78rem}
footer button{color:#9aa3b5; text-decoration:underline}
#appView{display:none}
.toast{position:fixed; left:50%; transform:translateX(-50%); bottom:90px; background:#1d2433; color:#fff;
  padding:11px 20px; border-radius:24px; font-size:.9rem; z-index:200; opacity:0; transition:opacity .25s; pointer-events:none}
.toast.on{opacity:.95}
</style>
</head>
<body>

<!-- ============ 로그인 화면 ============ -->
<div id="loginView">
  <div class="login-card">
    <h1>🏠 우리집 지출관리</h1>
    <p class="desc">가족만 볼 수 있는 우리집 가계부</p>
    <input id="liId" placeholder="아이디" autocomplete="username">
    <input id="liPw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <div class="err" id="liErr"></div>
  </div>
</div>

<!-- ============ 앱 화면 ============ -->
<div id="appView">
<header>
  <div class="hd-in">
    <div class="hd-top">
      <h1>🏠 우리집 지출관리<span class="who" id="whoami"></span></h1>
      <button class="gear" onclick="openSettings()">⚙️</button>
    </div>
    <!-- 재산현황/자산 탭은 숨김 (데이터는 유지 — 다시 켜려면 display:none 제거) -->
    <div class="tabs">
      <button id="tabBtn-ledger" class="on" onclick="showTab('ledger')">가계부</button>
      <button id="tabBtn-insur" onclick="showTab('insur')">보험</button>
      <button id="tabBtn-cards" onclick="showTab('cards')">카드</button>
      <button id="tabBtn-loans" onclick="showTab('loans')">대여금</button>
      <button id="tabBtn-deposits" onclick="showTab('deposits')">보증금</button>
      <button id="tabBtn-home" style="display:none" onclick="showTab('home')">재산현황</button>
      <button id="tabBtn-assets" style="display:none" onclick="showTab('assets')">자산</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="tab-ledger"></div>
  <div id="tab-cards" style="display:none"></div>
  <div id="tab-loans" style="display:none"></div>
  <div id="tab-deposits" style="display:none"></div>
  <div id="tab-insur" style="display:none"></div>
  <div id="tab-home" style="display:none"></div>
  <div id="tab-assets" style="display:none"></div>
  <footer>
    우리집 자산 <span id="verTxt"></span> ·
    <button onclick="openChangelog()">업데이트 내역</button>
  </footer>
</div>

<button class="fab" id="fabBtn" onclick="fabClick()">＋</button>
</div>

<!-- ============ 공용 모달 ============ -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
/* ============================================================
   우리집 자산 — 프론트엔드 (파일 1개, 프레임워크 없음)
   서버는 Supabase의 public.family_api() 함수 하나만 호출한다.
   ============================================================ */
const VERSION = 'v2.0.1';
const CHANGELOG = [
  ['v2.0.1', '2026-07-20', '납입 회차만 적으면 시작 월·남은 회차·끝나는 달 자동 역산 — 달력 안 봐도 됨. 회당 평균액 검산 표시'],
  ['v2.0.0', '2026-07-20', '보험 탭 신설 — 실제 납입 회차·총액(기준값 보정)과 비과세 해지일 관리. 누적 납입액이 자산으로 보임'],
  ['v1.9.3', '2026-07-20', '카드마다 용도 메모 — "생활비 전용, 주유·차량" 식으로 적어두면 카드 목록에 노란 라벨로 표시'],
  ['v1.9.2', '2026-07-20', '보증금을 기존 고정지출(렌트·월세)에 연결 — 고르면 이름·명의·돌려받는 시기 자동 입력, 양쪽에 서로 표시'],
  ['v1.9.1', '2026-07-20', '대여금 상환도 "매달 고정지출" 목록·총액에 포함 (기간 끝날 때까지 고정이니까)'],
  ['v1.9.0', '2026-07-20', '보증금 탭 신설 — 렌트·집 보증금 등록, 묶여있는 돈 합계와 돌려받는 시기 관리. 재산으로 자동 분류'],
  ['v1.8.0', '2026-07-20', '대여금 탭 신설 — 개인 간 빌린 돈/빌려준 돈, 매달 상환이 가계부에 자동 기록, 남은 금액·언제 끝나는지 자동 계산'],
  ['v1.7.0', '2026-07-20', '고정지출에 기간 개념 — 처음 납부 월·총 개월 수 입력하면 지금까지 몇 회/얼마 냈고 언제 끝나는지 자동 계산 (렌트·대출·적금용). 끝난 뒤엔 자동 기록도 멈춤'],
  ['v1.6.1', '2026-07-20', '카드탭 맨 위에 총한도/할부 중/남은 한도 요약 + 한도 사용률 게이지 추가'],
  ['v1.6.0', '2026-07-20', '카드·할부 탭 신설 — 남은 할부 총액·언제 끝나는지·월별 감소 그래프, 결제일에 가계부 자동 기록. 가계부 입력에 단발/고정 선택 추가'],
  ['v1.5.1', '2026-07-20', '내역마다 고정지출 여부 표시 — 목록에 초록 "고정" 라벨, 수정 화면에 고정지출 안내·설정 바로가기'],
  ['v1.5.0', '2026-07-20', '고정지출 완전 자동 기록(체크 불필요), 지난달 대비 비교 + 월별 지출 흐름 그래프, 고정지출별 누적 납부 횟수·총액 표시'],
  ['v1.4.0', '2026-07-20', '지출 전용 화면으로 단순화 — 재산현황·자산 탭 숨김 (데이터는 그대로, 나중에 다시 켤 수 있음)'],
  ['v1.3.0', '2026-07-20', '지출 달력 추가 — 날짜별 지출/수입과 "나갈 예정" 고정지출이 달력에 표시, 날짜 눌러서 바로 기록'],
  ['v1.2.0', '2026-07-20', '고정지출(매달 반복) 기능 — 등록해두면 매달 체크리스트로 뜸. 지출 탭을 첫 화면으로, 분류별 지출 그래프 추가'],
  ['v1.1.0', '2026-07-20', '가족 공용 아이디 1개로 로그인하도록 변경, 구성원 실제 이름 반영 (박지호·박소연·박현주·정시헌)'],
  ['v1.0.0', '2026-07-20', '첫 출시 — 재산현황·가계부·자산 관리, 월별 스냅샷, 엑셀 내보내기'],

/* ---------- 서버 호출 ---------- */
async function api(fn, ...args){
  const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/family_api', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_ANON, 'Authorization':'Bearer '+SUPABASE_ANON },
    body: JSON.stringify({ p_fn: fn, p_args: args })
  });
  if(!res.ok) throw new Error('서버 연결에 실패했습니다. ('+res.status+')');
  const data = await res.json();
  if(!data || data.ok === false){
    const msg = (data && data.error) || '알 수 없는 오류가 발생했습니다.';
    if(msg.includes('세션이 만료')){ localStorage.removeItem('fam_token'); TOKEN=''; showLogin(); }
    throw new Error(msg);
  }
  return data.result;
}

const $ = id => document.getElementById(id);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ return Math.round(n||0).toLocaleString('ko-KR'); }
function fmtWon(n){ return fmt(n)+'원'; }
/* 1억 2,345만원 식 한글 표기 */
function fmtKor(n){
  n = Math.round(n||0); const neg = n<0; n = Math.abs(n);
  if(n===0) return '0원';
  const eok = Math.floor(n/100000000), man = Math.floor((n%100000000)/10000), rest = n%10000;
  let s='';
  if(eok) s += fmt(eok)+'억 ';
  if(man) s += fmt(man)+'만 ';
  if(rest && !eok) s += fmt(rest);
  s = s.trim(); if(!s) s='0';
  return (neg?'-':'')+s+'원';
}
function today(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 1800); }

/* 스냅샷 + 현재값으로 순자산 추이 SVG 그리기 */
function trendSvg(){
  const pts = SNAPSHOTS.map(s=>({ym:s.ym, v:Number(s.netWorth)}));
  pts.push({ym:'현재', v:Number(TOTALS.netWorth)});
  if(pts.length < 2) return '<div class="empty" style="padding:20px 0">다음 달부터 추이 그래프가 쌓입니다 📈</div>';
  const W=700, H=180, P=34;
  const vs = pts.map(p=>p.v), min=Math.min(...vs,0), max=Math.max(...vs,1);
  const x = i => P + i*(W-2*P)/(pts.length-1);
  const y = v => H-P - (v-min)/(max-min||1)*(H-2*P);
  const line = pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p.v).toFixed(1)).join(' ');
  const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="4" fill="${i===pts.length-1?'#0ea5a4':'#2f6fed'}"/>`).join('');
  const labels = pts.map((p,i)=>{
    if(pts.length>6 && i%2===1 && i!==pts.length-1) return '';
    return `<text x="${x(i).toFixed(1)}" y="${H-8}" font-size="11" fill="#68738a" text-anchor="middle">${p.ym.replace(/^\d{2}/,'')}</text>`;
  }).join('');
  const vals = pts.map((p,i)=>{
    if(pts.length>5 && i!==0 && i!==pts.length-1) return '';
    return `<text x="${x(i).toFixed(1)}" y="${(y(p.v)-9).toFixed(1)}" font-size="11" font-weight="700" fill="#1a2b4a" text-anchor="middle">${fmtKor(p.v).replace('원','')}</text>`;
  }).join('');
  return `<svg id="trendChart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${line}" fill="none" stroke="#2f6fed" stroke-width="2.5" stroke-linecap="round"/>${dots}${labels}${vals}</svg>`;
}

/* 금액 축약 표기: 55000 → 5.5만 */
function fmtShort(n){
  n = Math.round(n||0);
  if(n >= 100000000) return (Math.round(n/10000000)/10)+'억';
  if(n >= 10000) return (Math.round(n/1000)/10)+'만';
  return fmt(n);
}
/* 이번 달 달력: 날짜별 지출/수입 + 아직 안 나간 고정지출 예정 표시 */
function renderCalendar(rows){
  const [y,m] = curYM.split('-').map(Number);
  const startDow = new Date(y, m-1, 1).getDay();
  const dim = new Date(y, m, 0).getDate();
  const todayStr = today();
  const expD={}, incD={};
  rows.forEach(r=>{
    const d = Number(r.date.slice(8));
    if(r.kind==='expense') expD[d]=(expD[d]||0)+Number(r.amount);
    else incD[d]=(incD[d]||0)+Number(r.amount);
  });
  let cells='';
  for(let i=0;i<startDow;i++) cells += '<div class="cal-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const ds = curYM+'-'+String(d).padStart(2,'0');
    const dow = (startDow+d-1)%7;
    cells += `<div class="cal-cell ${dow===0?'sun':''} ${ds===todayStr?'today':''}" onclick='openDayModal("${ds}")'>
      <div class="d">${d}</div>
      ${incD[d]?`<div class="ci">+${fmtShort(incD[d])}</div>`:''}
      ${expD[d]?`<div class="ce">-${fmtShort(expD[d])}</div>`:''}
    </div>`;
  }
  return `<div class="card cal-card">
    <div class="cal-week"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend"><span><b class="e">-지출</b></span><span><b class="i">+수입</b></span><span>날짜를 누르면 내역·기록</span></div>
  </div>`;
}

/* 이번 달에 체크됐는지 = 이 달 가계부에 연결(recurringId) 내역이 있는지 */
function recurringCard(rows){
  const items = RECURRING.filter(r=>r.active).sort((a,b)=>a.dom-b.dom);
  // 대여금(빌린 돈)도 기간이 끝나기 전까진 고정지출 — 이 달 상환분이 있으면 같이 표시
  const loanItems = (typeof LOANS!=='undefined'?LOANS:[]).filter(l=>l.direction!=='lent' && instPayAt(l, curYM)>0);
  if(!items.length && !loanItems.length){
    return `<div class="card"><div class="rec-head"><h3>매달 고정지출</h3>
      <button class="btn btn-ghost btn-sm" onclick="openRecurringForm()">＋ 등록</button></div>
      <div class="muted" style="padding:6px 0">통신비·보험·적금·대출처럼 매달 나가는 돈을 등록해두면<br>매달 자동으로 가계부에 기록되고 달력에 표시됩니다.</div></div>`;
  }
  const linked = new Set(rows.filter(x=>x.recurringId).map(x=>x.recurringId));
  const total = items.reduce((s,r)=>s+Number(r.amount),0)
              + loanItems.reduce((s,l)=>s+instPayAt(l, curYM),0);
  const merged = [
    ...items.map(r=>({ dom:r.dom, kind:'rec', r })),
    ...loanItems.map(l=>({ dom:l.payDom, kind:'loan', l }))
  ].sort((a,b)=>a.dom-b.dom);
  const list = merged.map(m=>{
    if(m.kind==='rec'){
      const r = m.r;
      const out = linked.has(r.id);   // 이 달 가계부에 들어가 있는지 (삭제로 뺐으면 false)
      const p = recurPeriod(r);
      const depSum = ASSETS.filter(a=>a.category==='보증금' && !a.isDebt && a.linkedRecurringId===r.id)
        .reduce((s,a)=>s+Number(a.value),0);
      const e = effPaid(r);
      const sub = (r.baseYm
        ? `<b>${e.cnt}${r.totalMonths?'/'+r.totalMonths:''}회</b> 실납입 · 누적 ${fmtKor(e.amt)}${p&&p.endYm?` · <b style="color:var(--accent)">${p.endYm.replace('-','.')} 끝</b>`:''}`
        : p
        ? `${p.startTxt} 시작 · <b>${p.cnt}${r.totalMonths?'/'+r.totalMonths:''}회</b> 납부 · 누적 ${fmtKor(p.paidAmt)}${p.endYm?` · <b style="color:var(--accent)">${p.endYm.replace('-','.')} 끝</b>`:''}`
        : `누적 ${r.paidCount||0}회 · ${fmtKor(r.paidTotal||0)}`)
        + (depSum?` · <b style="color:#1d6b50">보증금 ${fmtKor(depSum)}</b>`:'');
      return `<div class="rec-item" onclick='openRecurringForm(${JSON.stringify(r.id)})'>
        <span class="dd">${r.dom}일</span>
        <span class="nm">${esc(r.name)}${r.ownerId?` <span class="muted">· ${esc(memberName(r.ownerId))}</span>`:''}

        ${out?'':`<button class="btn btn-ghost btn-sm" onclick='event.stopPropagation();toggleRecurring(${JSON.stringify(r.id)},true)'>넣기</button>`}
      </div>`;
    }else{
      const l = m.l, k = instCalc(l);
      return `<div class="rec-item" onclick='openLoanForm(${JSON.stringify(l.id)})'>
        <span class="dd">${l.payDom}일</span>

          <div class="rec-sub">${Math.max(k.paidCnt,0)}/${l.months}회 · 남은 ${fmtKor(k.remainAmt)} · <b style="color:var(--accent)">${k.endYm.replace('-','.')} 끝</b></div>
        </span>
        <span class="amt">${fmt(instPayAt(l, curYM))}원</span>
      </div>`;
    }
  }).join('');
  return `<div class="card">
    <div class="rec-head"><h3>매달 고정지출 · 총 ${fmt(total)}원 (자동 기록)</h3>
      <button class="btn btn-ghost btn-sm" onclick="openRecurringManage()">관리</button></div>
    ${list}
    <div class="muted" style="margin-top:8px">매달 자동으로 가계부에 들어갑니다. 안 나간 달은 그 달 내역에서 삭제하면 됩니다</div>
  </div>`;
}
/* 기간 있는 고정지출(렌트·대출·적금)의 납부 현황 계산 */
function recurPeriod(r){
  if(!r.startYm) return null;
  const idx = ymDiff(THIS_YM, r.startYm);            // 시작 월부터 몇 번째 달인지
  let cnt = Math.max(idx+1, 0);                       // 지금까지 낸 회차 (매달 냈다고 가정)
  if(r.totalMonths) cnt = Math.min(cnt, r.totalMonths);
  const paidAmt = cnt * Number(r.amount);
  const endYm = r.totalMonths ? ymAdd(r.startYm, r.totalMonths-1) : null;
  const remainCnt = r.totalMonths ? Math.max(r.totalMonths - cnt, 0) : null;
  return { cnt, paidAmt, endYm, remainCnt,
    remainAmt: remainCnt!=null ? remainCnt*Number(r.amount) : null,
    startTxt: r.startYm.replace('-','.') };
}

/* 월별 지출 비교 (지난달 대비 + 최근 6개월 흐름) */
function monthlyCard(rows){
  const map = {};
  (MONTHLY||[]).forEach(m=>{ map[m.ym] = { inc:Number(m.income), exp:Number(m.expense) }; });
  // 보고 있는 달은 방금 불러온 내역으로 최신값 계산
  const liveExp = rows.filter(r=>r.kind==='expense').reduce((s,r)=>s+Number(r.amount),0);
  const liveInc = rows.filter(r=>r.kind==='income').reduce((s,r)=>s+Number(r.amount),0);
  map[curYM] = { inc:liveInc, exp:liveExp };
  const months=[]; for(let i=5;i>=0;i--) months.push(ymAdd(curYM,-i));
  const vals = months.map(ym=>({ ym, exp:(map[ym]?map[ym].exp:0) }));
  const prev = map[ymAdd(curYM,-1)];
  let diffTxt='';
  if(prev && prev.exp>0){
    const d = liveExp - prev.exp;
    diffTxt = `지난달 지출 <b>${fmtKor(prev.exp)}</b> → 이번 달 <b>${fmtKor(liveExp)}</b>
      <b style="color:${d>0?'var(--red)':'var(--green)'}">(${d>0?'▲':'▼'} ${fmtKor(Math.abs(d))})</b>`;
  }else{
    diffTxt = `이번 달 지출 <b>${fmtKor(liveExp)}</b> <span class="muted">(다음 달부터 지난달 비교가 됩니다)</span>`;
  }
  const max = Math.max(1, ...vals.map(v=>v.exp));
  const bars = vals.map(v=>`
    <div style="flex:1; text-align:center">
      <div style="height:64px; display:flex; align-items:flex-end; justify-content:center">
        <div style="width:70%; border-radius:5px 5px 0 0; height:${Math.max(v.exp>0?6:0, Math.round(v.exp/max*64))}px;
          background:${v.ym===curYM?'var(--accent)':'#c9d4ea'}"></div>
      </div>
      <div style="font-size:.66rem; color:${v.ym===curYM?'var(--accent)':'var(--sub)'}; font-weight:700; margin-top:3px">${Number(v.ym.slice(5))}월</div>
      <div style="font-size:.62rem; color:var(--sub)">${v.exp?fmtShort(v.exp):''}</div>
    </div>`).join('');
  return `<div class="card"><h3>월별 지출 흐름</h3>
    <div style="font-size:.9rem; margin-bottom:10px">${diffTxt}</div>
    <div style="display:flex; gap:4px">${bars}</div>
  </div>`;
}

      <div class="f-row"><label>기준 월 (이 달까지 낸 게 아래 값)</label><input id="rcBaseYm" type="month" value="${it&&it.baseYm?it.baseYm:''}"></div>
      <div class="f-row"><label>그때까지 납입 회차</label><input id="rcBaseCnt" type="number" min="0" placeholder="예: 49" value="${it&&it.baseCount!=null?it.baseCount:''}"></div>

    </div>`);
  moneyInput($('rcAmt'), $('rcAmtHint'));
  moneyInput($('rcBaseAmt'), $('rcBaseAmtHint'));
  // 기간 입력 시 "지금까지 몇 회·언제 끝" 미리보기

    const p = recurPeriod({ startYm:s, totalMonths:n||null, amount:amt });

  };
  ['rcStart','rcTotal','rcAmt'].forEach(x=>$(x).addEventListener('input', updPeriod));
  updPeriod();
  // 납입 회차만 적으면 시작 월을 역산해서 자동 정리
  const updBase = ()=>{

    const n = Number($('rcTotal').value||0);
    if(!by || !bc){ $('rcBaseHint').innerHTML=''; return; }
    const start = ymAdd(by, -(bc-1));
    $('rcStart').value = start;                       // 처음 납부 월 자동 입력
    let t = `→ <b>${start.replace('-','.')}부터 납입 시작</b>한 걸로 자동 계산`;
    if(ba > 0){
      const avg = Math.round(ba/bc);
      const amt = moneyVal($('rcAmt'));
      t += ` · 회당 평균 ${fmt(avg)}원${amt && Math.abs(avg-amt) <= amt*0.01 ? ' ✓ 월납액과 일치' : ''}`;
    }
    if(n > 0){
      const end = ymAdd(start, n-1);
      const remain = Math.max(n - bc, 0);
      const amt = moneyVal($('rcAmt'));
      t += `<br>→ 총 ${n}회 중 <b>남은 ${remain}회</b>${amt?` (약 ${fmtKor(remain*amt)})`:''} · <b>${end.replace('-','.')}에 납입 끝</b>`;
    }
    $('rcBaseHint').innerHTML = t;
    updPeriod();
  };
  ['rcBaseYm','rcBaseCnt','rcBaseAmt','rcTotal','rcAmt'].forEach(x=>$(x).addEventListener('input', updBase));
  updBase();
  if(!it) setTimeout(()=>$('rcName').focus(), 50);
}

/* 이번 달 분류별 지출 그래프 */
function monthCatBars(rows){
  const sums = {};
  rows.filter(r=>r.kind==='expense').forEach(r=>{ sums[r.category]=(sums[r.category]||0)+Number(r.amount); });
  const cats = Object.entries(sums).sort((a,b)=>b[1]-a[1]);
  if(!cats.length) return '';
  const max = cats[0][1];
  return `<div class="card"><h3>분류별 지출</h3>
    ${cats.map(([c,v])=>`<div class="catbar">
      <div class="t"><span>${esc(c)}</span><b>${fmt(v)}원</b></div>
      <div class="bar"><i style="width:${Math.round(v/max*100)}%"></i></div>
    </div>`).join('')}</div>`;
}

/* ============================================================
   카드·할부 — 남은 할부 총액과 "언제 끝나는지" 관리
   ============================================================ */
function ymDiff(a,b){ // a월 - b월 (개월 수)
  const [ay,am]=a.split('-').map(Number), [by,bm]=b.split('-').map(Number);
  return (ay*12+am)-(by*12+bm);
}
/* 할부 1건의 현재 상태 계산 (기준: 이번 달) */
function instCalc(i, refYm){
  const idx = ymDiff(refYm||THIS_YM, i.firstYm);      // 이번 달이 몇 회차인지 (0부터)
  const monthly = Number(i.monthlyAmount) || Math.floor(i.totalAmount/i.months);
  const paidCnt = Math.min(Math.max(idx+1, 0), i.months);
  const paidAmt = paidCnt >= i.months ? Number(i.totalAmount) : monthly*paidCnt;
  const remainAmt = Math.max(Number(i.totalAmount) - paidAmt, 0);
  const endYm = ymAdd(i.firstYm, i.months-1);
  return { idx, monthly, paidCnt, paidAmt, remainAmt, endYm, done: idx >= i.months };
}
/* 특정 월의 할부 납부액 */
function instPayAt(i, ym){
  const idx = ymDiff(ym, i.firstYm);
  if(idx < 0 || idx >= i.months) return 0;
  const monthly = Number(i.monthlyAmount) || Math.floor(i.totalAmount/i.months);
  return idx === i.months-1 ? Number(i.totalAmount) - monthly*(i.months-1) : monthly;
}
function renderCards(){
  const el = $('tab-cards'); if(!el) return;
  if(!CARDS.length){
    el.innerHTML = `<div class="empty" style="padding-top:60px">
      먼저 쓰는 카드를 등록하세요.<br>그 다음 할부 건들을 넣으면<br><b>남은 할부 총액과 언제 끝나는지</b>가 자동 계산됩니다.<br><br>
      <button class="btn btn-primary" onclick="openCardForm()">＋ 카드 등록</button></div>`;
    return;
  }
  const calcs = INSTS.map(i=>({ i, c: instCalc(i) }));
  const alive = calcs.filter(x=>!x.c.done);
  const totalRemain = alive.reduce((s,x)=>s+x.c.remainAmt, 0);
  const totalLimit = CARDS.filter(c=>c.active).reduce((s,c)=>s+Number(c.limitAmount||0), 0);
  const freeLimit = Math.max(totalLimit - totalRemain, 0);
  const usePct = totalLimit ? Math.min(Math.round(totalRemain/totalLimit*100), 100) : 0;
  const limitHtml = totalLimit ? `
    <div class="led-sum" style="margin-top:14px">
      <div><div class="l">총 한도</div><div class="v">${fmtKor(totalLimit)}</div></div>
      <div><div class="l">할부 중</div><div class="v" style="color:var(--red)">${fmtKor(totalRemain)}</div></div>
      <div><div class="l">남은 한도</div><div class="v" style="color:var(--green)">${fmtKor(freeLimit)}</div></div>
    </div>
    <div class="card" style="padding:12px 16px">
      <div style="display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:6px">
        <span class="muted">한도 사용률</span><b style="color:${usePct>=70?'var(--red)':usePct>=40?'#e8871e':'var(--green)'}">${usePct}%</b>
      </div>
      <div class="bar" style="height:10px; background:#edf0f6; border-radius:6px; overflow:hidden">
        <i style="display:block; height:100%; width:${usePct}%; border-radius:6px;
          background:${usePct>=70?'var(--red)':usePct>=40?'#e8871e':'var(--green)'}"></i>
      </div>
    </div>` : `
    <div class="muted" style="text-align:center; margin-top:12px">카드 수정에서 한도를 입력하면 총한도·남은 한도가 여기 표시됩니다</div>`;
  const thisPay = INSTS.reduce((s,i)=>s+instPayAt(i, THIS_YM), 0);
  const lastPay = INSTS.reduce((s,i)=>s+instPayAt(i, ymAdd(THIS_YM,-1)), 0);
  const maxEnd = alive.length ? alive.map(x=>x.c.endYm).sort().pop() : null;

  // 목표 요약
  let goalHtml;
  if(!alive.length){
    goalHtml = `<div class="lbl">남은 할부</div><div class="big">0원 🎉</div><div class="kor">모든 할부가 끝났습니다!</div>`;
  }else{
    const [ey,em] = maxEnd.split('-');
    const leftM = ymDiff(maxEnd, THIS_YM);
    goalHtml = `
      <div class="lbl">남은 할부 총액</div>
      <div class="big">${fmtWon(totalRemain)}</div>
      <div class="kor">${fmtKor(totalRemain)}</div>
      <div class="diff" style="margin-top:12px">🎯 새 할부만 안 만들면 <b>${Number(ey)}년 ${Number(em)}월</b>에 전부 끝 (${leftM}개월 남음)</div>
      <div class="split">
        <div><div class="lbl">지난달 납부</div><div class="val">${lastPay?fmtKor(lastPay):'-'}</div></div>
        <div><div class="lbl">이번 달 납부</div><div class="val">${fmtKor(thisPay)}</div></div>
      </div>`;
  }

  // 앞으로 월별 납부액이 줄어드는 그래프 (최대 18개월)
  let projHtml='';
  if(alive.length){
    const end = ymDiff(maxEnd, THIS_YM) > 17 ? ymAdd(THIS_YM, 17) : maxEnd;
    const months=[]; let ym=THIS_YM;
    while(ym<=end){ months.push(ym); ym=ymAdd(ym,1); }
    const vals = months.map(ym=>({ ym, v: INSTS.reduce((s,i)=>s+instPayAt(i,ym),0) }));
    const max = Math.max(1, ...vals.map(v=>v.v));
    projHtml = `<div class="card"><h3>앞으로 매달 나갈 할부금 (줄어드는 게 목표)</h3>
      <div style="display:flex; gap:3px; overflow-x:auto">${vals.map(v=>`
        <div style="flex:1; min-width:34px; text-align:center">
          <div style="height:64px; display:flex; align-items:flex-end; justify-content:center">
            <div style="width:72%; border-radius:4px 4px 0 0; height:${v.v?Math.max(6,Math.round(v.v/max*64)):0}px;
              background:${v.ym===THIS_YM?'var(--accent)':'#c9d4ea'}"></div>
          </div>
          <div style="font-size:.62rem; color:var(--sub); font-weight:700; margin-top:3px">${Number(v.ym.slice(5))}월</div>
          <div style="font-size:.6rem; color:var(--sub)">${v.v?fmtShort(v.v):''}</div>
        </div>`).join('')}</div></div>`;
  }

  // 카드별 목록
  const cardSections = CARDS.filter(c=>c.active).map(c=>{
    const list = calcs.filter(x=>x.i.cardId===c.id);
    const aliveList = list.filter(x=>!x.c.done);
    const doneCnt = list.length - aliveList.length;
    const cardRemain = aliveList.reduce((s,x)=>s+x.c.remainAmt,0);
    const rows = aliveList.map(({i,c:k})=>`
      <div class="rec-item" onclick='openInstForm(${JSON.stringify(i.id)})'>
        <span class="nm">${esc(i.name)}${i.ownerId?` <span class="muted">· ${esc(memberName(i.ownerId))}</span>`:''}
          <div class="rec-sub">${Math.max(k.paidCnt,0)}/${i.months}회 · 월 ${fmt(k.monthly)}원 · <b>${k.endYm.replace('-','.')} 끝</b></div>
        </span>
        <span class="amt">남은 ${fmtKor(k.remainAmt)}</span>
      </div>`).join('');
    return `<div class="card">
      <div class="rec-head">
        <h3>💳 ${esc(c.name)} <span class="muted" style="font-weight:400">· 결제일 ${c.payDom}일${c.limitAmount?' · 한도 '+fmtKor(c.limitAmount):''}</span></h3>
        <button class="btn btn-ghost btn-sm" onclick='openCardForm(${JSON.stringify(c.id)})'>수정</button>
      </div>
      ${c.memo?`<div style="margin:-4px 0 8px"><span class="cat" style="background:#fff7e0;color:#a16207">용도</span> <span style="font-size:.88rem">${esc(c.memo)}</span></div>`:''}
      ${rows || '<div class="muted" style="padding:4px 0">진행 중인 할부 없음</div>'}
      ${doneCnt?`<div class="muted" style="margin-top:6px">완납된 할부 ${doneCnt}건</div>`:''}
      <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center">
        <span class="muted">이 카드 남은 할부 <b style="color:var(--txt)">${fmtKor(cardRemain)}</b></span>
        <button class="btn btn-ghost btn-sm" onclick='openInstForm("", ${JSON.stringify(c.id)})'>＋ 할부 추가</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    ${limitHtml}
    <div class="networth" style="background:linear-gradient(135deg,#7c2d5a,#a94467)">${goalHtml}</div>
    ${projHtml}
    ${cardSections}
    <div class="row" style="margin-top:16px; justify-content:center">
      <button class="btn btn-ghost btn-sm" onclick="openCardForm()">＋ 카드 추가</button>
    </div>
    <div class="muted" style="text-align:center; margin-top:10px">할부금은 각 카드 결제일에 가계부·달력에 자동 기록됩니다</div>`;
}

/* ============================================================
   대여금 — 개인 간 빌린 돈/빌려준 돈 관리
   (할부와 같은 계산 방식: 총액/개월수/첫 달 → 남은 금액·종료 시점)
   ============================================================ */
function renderLoans(){
  const el = $('tab-loans'); if(!el) return;
  if(!LOANS.length){
    el.innerHTML = `<div class="empty" style="padding-top:60px">
      개인적으로 빌린 돈 / 빌려준 돈을 등록하세요.<br>
      <b>누구한테 · 총 얼마 · 몇 개월 · 언제부터</b>만 넣으면<br>
      매달 갚는 돈이 가계부에 자동 기록되고,<br>얼마 남았고 언제 끝나는지 자동 계산됩니다.<br><br>
      <button class="btn btn-primary" onclick="openLoanForm()">＋ 대여금 등록</button></div>`;
    return;
  }
  const calcs = LOANS.map(l=>({ l, c: instCalc(l) }));
  const bor = calcs.filter(x=>x.l.direction!=='lent');
  const lent = calcs.filter(x=>x.l.direction==='lent');
  const borRemain = bor.filter(x=>!x.c.done).reduce((s,x)=>s+x.c.remainAmt,0);
  const lentRemain = lent.filter(x=>!x.c.done).reduce((s,x)=>s+x.c.remainAmt,0);
  const thisPay = LOANS.filter(l=>l.direction!=='lent').reduce((s,l)=>s+instPayAt(l,THIS_YM),0);
  const borAlive = bor.filter(x=>!x.c.done);
  const maxEnd = borAlive.length ? borAlive.map(x=>x.c.endYm).sort().pop() : null;

  let goalHtml;
  if(!borAlive.length){
    goalHtml = `<div class="lbl">갚을 돈</div><div class="big">0원 🎉</div><div class="kor">빌린 돈을 다 갚았습니다!</div>`;
  }else{
    const [ey,em] = maxEnd.split('-');
    goalHtml = `
      <div class="lbl">아직 갚아야 할 돈</div>
      <div class="big">${fmtWon(borRemain)}</div>
      <div class="kor">${fmtKor(borRemain)}</div>
      <div class="diff" style="margin-top:12px">🎯 이대로 갚으면 <b>${Number(ey)}년 ${Number(em)}월</b>에 끝 (${ymDiff(maxEnd,THIS_YM)}개월 남음)</div>
      <div class="split">
        <div><div class="lbl">이번 달 상환</div><div class="val">${fmtKor(thisPay)}</div></div>
        <div><div class="lbl">받을 돈(빌려준 것)</div><div class="val">${lentRemain?fmtKor(lentRemain):'없음'}</div></div>
      </div>`;
  }

  const row = ({l,c:k}) => `
    <div class="rec-item" onclick='openLoanForm(${JSON.stringify(l.id)})'>
      <span class="nm">${esc(l.counterparty)}${l.ownerId?` <span class="muted">· ${esc(memberName(l.ownerId))}</span>`:''}${l.memo?` <span class="muted">· ${esc(l.memo)}</span>`:''}
        <div class="rec-sub">${l.firstYm.replace('-','.')} 시작 · ${Math.max(k.paidCnt,0)}/${l.months}회 · 매달 ${l.payDom}일 ${fmt(k.monthly)}원 · <b style="color:var(--accent)">${k.endYm.replace('-','.')} 끝</b></div>
      </span>
      <span class="amt">${k.done?'<span class="muted">완료</span>':'남은 '+fmtKor(k.remainAmt)}</span>
    </div>`;
  const borHtml = bor.length ? `<div class="card"><h3>💸 빌린 돈 (갚는 중)</h3>${bor.map(row).join('')}</div>` : '';
  const lentHtml = lent.length ? `<div class="card"><h3>🤝 빌려준 돈 (받는 중)</h3>${lent.map(row).join('')}</div>` : '';

  el.innerHTML = `
    <div class="networth" style="background:linear-gradient(135deg,#2d5a7c,#44779a)">${goalHtml}</div>
    ${borHtml}${lentHtml}
    <div class="row" style="margin-top:16px; justify-content:center">
      <button class="btn btn-ghost btn-sm" onclick="openLoanForm()">＋ 대여금 추가</button>
    </div>
    <div class="muted" style="text-align:center; margin-top:10px">매달 상환일에 가계부·달력에 자동 기록됩니다 (빌린 돈=지출, 빌려준 돈=수입)</div>`;
}

/* ============================================================
   보험 — 분류 '보험'인 고정지출을 실납입 실적과 함께 관리
   ============================================================ */
/* 실제 누적 납입 (기준값 + 그 이후 앱 자동기록) — 기준값 없으면 시작월 추정 */
function effPaid(r){
  if(r.baseYm != null && r.baseYm !== ''){
    return { cnt: Number(r.baseCount||0) + Number(r.paidCountAfterBase||0),
             amt: Number(r.baseAmount||0) + Number(r.paidTotalAfterBase||0), real: true };
  }
  const p = recurPeriod(r);
  if(p) return { cnt: p.cnt, amt: p.paidAmt, real: false };
  return { cnt: Number(r.paidCount||0), amt: Number(r.paidTotal||0), real: false };
}
/* 해지가능일까지 남은 기간 표기 */
function maturityTxt(d){
  if(!d) return '';
  const today = new Date(); const md = new Date(d+'T00:00:00');
  const days = Math.ceil((md - today) / 86400000);
  if(days <= 0) return `<b style="color:var(--green)">해지 비과세 가능 (${d.replace(/-/g,'.')} 지남)</b>`;
  const y = Math.floor(days/365), m = Math.floor((days%365)/30);
  return `<b style="color:#a16207">${d.replace(/-/g,'.')} 이후 해지 비과세</b> <span class="muted">(${y?y+'년 ':''}${m}개월 남음)</span>`;
}
function renderInsurance(){
  const el = $('tab-insur'); if(!el) return;
  const items = RECURRING.filter(r=>r.category==='보험' && r.active).sort((a,b)=>a.dom-b.dom);
  if(!items.length){
    el.innerHTML = `<div class="empty" style="padding-top:60px">
      분류를 <b>'보험'</b>으로 등록한 고정지출이 자동으로 여기 모입니다.<br>
      실제 납입 회차·총액과 비과세 해지일까지 관리됩니다.<br><br>
      <button class="btn btn-primary" onclick="openRecurringForm('', '보험')">＋ 보험 등록</button></div>`;
    return;
  }
  const totalPaid = items.reduce((s,r)=>s+effPaid(r).amt, 0);
  const monthlySum = items.reduce((s,r)=>s+Number(r.amount), 0);
  const rows = items.map(r=>{
    const e = effPaid(r);
    // 시작 월: 직접 입력값이 있으면 그걸, 없으면 회차에서 역산
    const dispStart = r.startYm || (r.baseYm && r.baseCount ? ymAdd(r.baseYm, -(Number(r.baseCount)-1)) : null);
    let periodTxt = '';
    if(r.totalMonths && dispStart){
      const end = ymAdd(dispStart, Number(r.totalMonths)-1);
      const remain = Math.max(Number(r.totalMonths) - e.cnt, 0);
      periodTxt = ` · 남은 ${remain}회 (약 ${fmtKor(remain*Number(r.amount))}) · <b style="color:var(--accent)">${end.replace('-','.')} 납입 끝</b>`;
    }
    return `<div class="rec-item" onclick='openRecurringForm(${JSON.stringify(r.id)})'>
      <span class="nm">${esc(r.name)}${r.ownerId?` <span class="muted">· ${esc(memberName(r.ownerId))}</span>`:''}
        <div class="rec-sub">${dispStart?dispStart.replace('-','.')+' 시작 · ':''}<b>${e.cnt}${r.totalMonths?'/'+r.totalMonths:''}회 납입 · 누적 ${fmtKor(e.amt)}</b>${e.real?'':' (추정)'}${periodTxt}</div>
        ${r.maturityDate?`<div class="rec-sub">${maturityTxt(r.maturityDate)}</div>`:''}
      </span>
      <span class="amt">월 ${fmt(r.amount)}원</span>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="networth" style="background:linear-gradient(135deg,#4a3a7c,#6b58a8)">
      <div class="lbl">보험에 지금까지 부은 돈 (해지하면 자산)</div>
      <div class="big">${fmtWon(totalPaid)}</div>
      <div class="kor">${fmtKor(totalPaid)} · ${items.length}건</div>
      <div class="split">
        <div><div class="lbl">매달 나가는 보험료</div><div class="val">${fmtKor(monthlySum)}</div></div>
        <div><div class="lbl">건수</div><div class="val">${items.length}건</div></div>
      </div>
    </div>
    <div class="card"><h3>보험 목록 (누르면 수정 — 실납입·비과세일 입력)</h3>${rows}</div>
    <div class="row" style="margin-top:16px; justify-content:center">
      <button class="btn btn-ghost btn-sm" onclick="openRecurringForm('', '보험')">＋ 보험 추가</button>
    </div>
    <div class="muted" style="text-align:center; margin-top:10px">매달 보험료는 가계부에 자동 기록되고, 납입 회차·누적액이 계속 쌓입니다</div>`;
}

    <button class="menu-item" onclick="openMembers()">👨‍👩‍👧‍👦 가족 계정 관리<span class="arr">›</span></button>
    <button class="menu-item" onclick="openAudit()">📋 변경 이력 (감사로그)<span class="arr">›</span></button>
    <button class="menu-item" onclick="doSnapshotNow()">📸 이번 달 재산 스냅샷 기록<span class="arr">›</span></button>`:''}
    <button class="menu-item" onclick="openChangelog()">🆕 업데이트 내역<span class="arr">›</span></button>
    <button class="menu-item" style="color:var(--red)" onclick="doLogout()">🚪 로그아웃<span class="arr">›</span></button>`);
}
async function doLogout(){
  try{ await api('logout', TOKEN); }catch(e){}
  localStorage.removeItem('fam_token'); TOKEN='';
  closeModal(); showLogin();
}
function openMyPassword(){
  openModal(`
    <h2>내 비밀번호 변경</h2>
    <div class="f-row"><label>현재 비밀번호</label><input id="pwCur" type="password"></div>
    <div class="f-row"><label>새 비밀번호 (4자 이상)</label><input id="pwNew" type="password"></div>
    <div class="f-row"><label>새 비밀번호 확인</label><input id="pwNew2" type="password"></div>
    <div class="m-actions"><button class="btn btn-primary" onclick="doChangePw()">변경</button></div>`);
}
async function doChangePw(){
  if($('pwNew').value !== $('pwNew2').value) return alert('새 비밀번호가 서로 다릅니다.');
  try{
    await api('changeMyPassword', TOKEN, $('pwCur').value, $('pwNew').value);
    closeModal(); toast('비밀번호를 변경했습니다');
  }catch(e){ alert(e.message); }
}
function openMembers(){
  const rows = MEMBERS.map(m=>`
    <div class="hist-row" style="align-items:center">
      <span><b>${esc(m.displayName)}</b> <span class="muted">(${esc(m.username)}${m.role==='admin'?' · 공용 로그인':''}${m.active?'':' · 정지'})</span></span>
      <button class="btn btn-ghost btn-sm" onclick='openMemberEdit(${JSON.stringify(m.id)})'>수정</button>
    </div>`).join('');
  openModal(`<h2>가족 계정 관리</h2>${rows}
    <div class="m-actions">
      <button class="btn btn-ghost" onclick="openMemberAdd()">＋ 가족 추가</button>
      <button class="btn btn-primary" onclick="closeModal()">닫기</button>
    </div>`);
}
function openMemberEdit(id){
  const m = MEMBERS.find(x=>x.id===id);
  openModal(`
    <h2>${esc(m.username)} 계정 수정</h2>
    <div class="f-row"><label>표시 이름 (예: 아빠, 엄마)</label><input id="meName" value="${esc(m.displayName)}"></div>
    <div class="f-row"><label>새 비밀번호 (바꿀 때만 입력)</label><input id="mePw" type="password" placeholder="비워두면 그대로"></div>
    ${m.role!=='admin'?`<div class="f-row"><label><input type="checkbox" id="meActive" ${m.active?'checked':''} style="width:auto;margin-right:6px">로그인 허용</label></div>`:''}
    <div class="m-actions"><button class="btn btn-primary" onclick='doMemberUpdate(${JSON.stringify(m.id)}, ${m.role==='admin'})'>저장</button></div>`);
}
async function doMemberUpdate(id, isAdmin){
  try{
    const info = { displayName: $('meName').value.trim(), newPassword: $('mePw').value };
    if(!isAdmin) info.active = $('meActive').checked;
    await api('memberUpdate', TOKEN, id, info);
    closeModal(); toast('저장했습니다'); await reload();
  }catch(e){ alert(e.message); }
}
function openMemberAdd(){
  openModal(`
    <h2>가족 추가</h2>
    <div class="f-row"><label>아이디 (로그인용, 영문/숫자)</label><input id="maId"></div>
    <div class="f-row"><label>표시 이름</label><input id="maName" placeholder="예: 막내"></div>
    <div class="f-row"><label>비밀번호 (4자 이상)</label><input id="maPw" type="password"></div>
    <div class="m-actions"><button class="btn btn-primary" onclick="doMemberAdd()">추가</button></div>`);
}
async function doMemberAdd(){
  try{
    await api('memberCreate', TOKEN, { username:$('maId').value.trim(), displayName:$('maName').value.trim(), password:$('maPw').value });
    closeModal(); toast('추가했습니다'); await reload();
  }catch(e){ alert(e.message); }
}
async function openAudit(){
  try{
    const rows = await api('listAudit', TOKEN);
    const NAME = {assetSave:'자산 저장',assetDelete:'자산 삭제',ledgerSave:'가계부 저장',ledgerDelete:'가계부 삭제',
      memberCreate:'가족 추가',memberUpdate:'계정 수정',changeMyPassword:'비번 변경',snapshotNow:'스냅샷',login:'로그인'};
    openModal(`<h2>변경 이력 (최근 300건)</h2>
      <div style="overflow-x:auto"><table class="tbl">
      <tr><th>시각</th><th>누가</th><th>무엇을</th><th>IP·기기</th></tr>
      ${rows.map(r=>`<tr><td>${r.at}</td><td>${esc(r.actor)}</td><td>${NAME[r.action]||esc(r.action)}</td>
        <td class="muted">${esc(r.ip||'')}<br>${esc((r.ua||'').slice(0,40))}</td></tr>`).join('')}
      </table></div>
      <div class="m-actions"><button class="btn btn-ghost" onclick="closeModal()">닫기</button></div>`);
  }catch(e){ alert(e.message); }
}
async function doSnapshotNow(){
  if(!confirm('지금 시점의 재산 상태를 이번 달 기록으로 저장할까요?')) return;
  try{ const r = await api('snapshotNow', TOKEN); toast(r.ym+' 스냅샷 저장 완료'); await reload(); closeModal(); }
  catch(e){ alert(e.message); }
}
function openChangelog(){
  openModal(`<h2>업데이트 내역</h2>
    ${CHANGELOG.map(c=>`<div style="margin-bottom:14px"><b>${c[0]}</b> <span class="muted">(${c[1]})</span><br><span style="font-size:.9rem">${c[2]}</span></div>`).join('')}
    <div class="m-actions"><button class="btn btn-ghost" onclick="closeModal()">닫기</button></div>`);
}

/* ---------- 모달 공통 ---------- */
function openModal(html){ $('modalBox').innerHTML = html; $('overlay').classList.add('on'); }
function closeModal(){ $('overlay').classList.remove('on'); }
</script>
</body>
</html>
